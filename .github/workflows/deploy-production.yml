name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY_PRODUCTION after staging approval
        required: true

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Require explicit confirmation
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: test "$CONFIRMATION" = DEPLOY_PRODUCTION
      - name: Require distinct production target
        env:
          PRODUCTION_REF: ${{ vars.SUPABASE_PRODUCTION_PROJECT_ID }}
          STAGING_REF: ${{ vars.SUPABASE_STAGING_PROJECT_ID }}
        run: test -n "$PRODUCTION_REF" && test "$PRODUCTION_REF" != "$STAGING_REF"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dry-run and apply production migrations
        run: |
          pnpm exec supabase link --project-ref '${{ vars.SUPABASE_PRODUCTION_PROJECT_ID }}'
          pnpm exec supabase db push --linked --dry-run
          pnpm exec supabase db push --linked
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Build production image
        run: >-
          gcloud builds submit
          --project=${{ vars.GCP_PROJECT_ID }}
          --config=infra/gcp/cloudbuild-api.yaml
          --substitutions=_IMAGE=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPOSITORY }}/iatron-api:${{ github.sha }} .
      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service: iatron-api-production
          image: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPOSITORY }}/iatron-api:${{ github.sha }}
          env_vars: |-
            NODE_ENV=production
            APP_ENV=production
            LOG_LEVEL=info
            SUPABASE_URL=${{ vars.SUPABASE_PRODUCTION_URL }}
            SUPABASE_JWT_ISSUER=${{ vars.SUPABASE_PRODUCTION_URL }}/auth/v1
            SUPABASE_JWT_AUDIENCE=authenticated
            SUPABASE_JWT_ALGORITHMS=ES256,RS256
            CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}
          secrets: |-
            SUPABASE_PUBLISHABLE_KEY=SUPABASE_PRODUCTION_PUBLISHABLE_KEY:latest
          flags: >-
            --service-account=${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
            --port=8080
      - name: Smoke production API
        env:
          API_URL: ${{ steps.deploy.outputs.url }}
        run: sh scripts/smoke-cloud.sh "$API_URL"
