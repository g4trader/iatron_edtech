name: Deploy API Staging

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Deploy Supabase Staging]
    types: [completed]

concurrency:
  group: api-staging
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Build immutable image
        run: >-
          gcloud builds submit
          --project=${{ vars.GCP_PROJECT_ID }}
          --config=infra/gcp/cloudbuild-api.yaml
          --substitutions=_IMAGE=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPOSITORY }}/iatron-api:${{ github.event.workflow_run.head_sha || github.sha }} .
      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.GCP_REGION }}
          service: iatron-api-staging
          image: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPOSITORY }}/iatron-api:${{ github.event.workflow_run.head_sha || github.sha }}
          env_vars: |-
            NODE_ENV=production
            APP_ENV=staging
            LOG_LEVEL=info
            SUPABASE_URL=${{ vars.SUPABASE_STAGING_URL }}
            SUPABASE_JWT_ISSUER=${{ vars.SUPABASE_STAGING_URL }}/auth/v1
            SUPABASE_JWT_AUDIENCE=authenticated
            SUPABASE_JWT_ALGORITHMS=ES256,RS256
            CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}
          secrets: |-
            SUPABASE_PUBLISHABLE_KEY=SUPABASE_STAGING_PUBLISHABLE_KEY:latest
          flags: >-
            --service-account=${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
            --min-instances=0
            --max-instances=2
            --cpu=1
            --memory=512Mi
            --timeout=60s
            --port=8080
      - name: Smoke API
        env:
          API_URL: ${{ steps.deploy.outputs.url }}
        run: sh scripts/smoke-cloud.sh "$API_URL"
